<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Games</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 2rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .games-list {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
        }
        .game-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 2rem;
            width: 280px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, border-color 0.2s;
        }
        .game-card:hover {
            transform: translateY(-4px);
            border-color: #58a6ff;
        }
        .game-card h2 {
            font-size: 1.4rem;
            margin-bottom: 0.5rem;
            color: #58a6ff;
        }
        .game-card p {
            font-size: 0.9rem;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <h1>Games</h1>
    <div class="games-list">
        <a class="game-card" href="https://recursionbane.github.io/V2/">
            <h2>TETRABOUNCE</h2>
            <p>A bouncing tetra game — tap, bounce, and level up!</p>
        </a>
        <a class="game-card" href="https://recursionbane.github.io/BallPit/">
            <h2>BALLPIT</h2>
            <p>A Ball X Pit clone — dive into the pit!</p>
        </a>
        <a class="game-card" href="https://recursionbane.github.io/PrankWars/">
            <h2>PRANKWARS.IO</h2>
            <p>Chaos Addition — outprank your rivals!</p>
        </a>
        <a class="game-card" href="https://recursionbane.github.io/BooFu/">
            <h2>BOOFU</h2>
            <p>Boomerang Fu! — slice, dice, and boomerang your way to victory!</p>
        </a>
    </div>
</body>
</html>
